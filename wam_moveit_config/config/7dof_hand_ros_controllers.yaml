joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

joint_trajectory_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - q1
    - q2
    - q3
    - q4
    - q5
    - q6
    - q7
    
  constraints:
    goal_time: 0.6
    stopped_velocity_tolerance: 0.05
    q1: {trajectory: 0.1, goal: 0.1}
    q2: {trajectory: 0.1, goal: 0.1}
    q3: {trajectory: 0.1, goal: 0.1}
    q4: {trajectory: 0.1, goal: 0.1}
    q5: {trajectory: 0.1, goal: 0.1}
    q6: {trajectory: 0.1, goal: 0.1}
    q7: {trajectory: 0.1, goal: 0.1}
    stop_trajectory_duration: 0.5
    state_publish_rate:  250
    action_monitor_rate: 10

bhand_joint_trajectory_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - bhand_j11_joint
    - bhand_j12_joint
    - bhand_j13_joint
    - bhand_j21_joint
    - bhand_j22_joint
    - bhand_j23_joint
    - bhand_j32_joint
    - bhand_j33_joint
    
  constraints:
    goal_time: 0.6
    stopped_velocity_tolerance: 0.05
    bhand_j11_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j12_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j13_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j21_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j22_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j23_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j32_joint: {trajectory: 0.1, goal: 0.1}
    bhand_j33_joint: {trajectory: 0.1, goal: 0.1}
    stop_trajectory_duration: 0.5
    state_publish_rate:  250
    action_monitor_rate: 10