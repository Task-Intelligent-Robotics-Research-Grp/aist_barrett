joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

joint_trajectory_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - q1
    - q2
    - q3
    - q4
    - q5
    - q6
    - q7
    
  constraints:
    goal_time: 0.6
    stopped_velocity_tolerance: 0.5
    q1: {trajectory: 0.1, goal: 0.1}
    q2: {trajectory: 0.1, goal: 0.1}
    q3: {trajectory: 0.1, goal: 0.1}
    q4: {trajectory: 0.1, goal: 0.1}
    q5: {trajectory: 0.1, goal: 0.1}
    q6: {trajectory: 0.1, goal: 0.1}
    q7: {trajectory: 0.1, goal: 0.1}
    stop_trajectory_duration: 0.5
    state_publish_rate:  250
    action_monitor_rate: 10
